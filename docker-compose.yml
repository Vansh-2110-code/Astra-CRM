version: '3.8'

services:
  database:
    image: mysql:8.0
    container_name: astra-crm-db
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: astra_crm_db
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7.0-alpine
    container_name: astra-crm-redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: astra-crm-backend
    restart: always
    ports:
      - '5000:5000'
    environment:
      - PORT=5000
      - NODE_ENV=development
      - DATABASE_URL=mysql://root:root_password@database:3306/astra_crm_db
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=9f8c7b6a5e4d3c2b1a0f9e8d7c6b5a4f3e2d1c0b9a8f7e6d5c4b3a2f1e0d9c8b
      - JWT_REFRESH_SECRET=7c6b5a4f3e2d1c0b9a8f7e6d5c4b3a2f1e0d9c8b7a6f5e4d3c2b1a0f9e8d7c6b
    depends_on:
      - database
      - redis

volumes:
  mysql_data:
  redis_data:
